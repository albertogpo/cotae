<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cotaê</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(ellipse 700px 500px at 15% -5%, rgba(79,195,255,0.14), transparent 60%),
      radial-gradient(ellipse 700px 500px at 90% 15%, rgba(57,229,157,0.10), transparent 60%),
      #0a0e15;
    color:#edf2f7;
    font-family:'IBM Plex Mono', monospace;
    text-align:center;
    padding:20px;
  }
  h1{
    font-family:'Baloo 2',sans-serif;
    font-size:40px;
    text-transform:lowercase;
    background:linear-gradient(100deg, #39e59d 0%, #4fc3ff 75%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    margin:0 0 12px;
  }
  p{color:#7c8ba0;font-size:14px;max-width:420px;line-height:1.6;margin:0 auto;}
</style>
</head>
<body>
  <div>
    <h1>cotaê</h1>
    <p>A versão pública está a caminho. Volte em breve.</p>
  </div>
</body>
</html>
